# ╔══════════════════════════════════════════════════════════════════╗
# ║         🐳 docker-compose.yml — AI Agent Brain Lab 통합 실행       ║
# ║                                                                  ║
# ║  [파일 목적]                                                     ║
# ║  3개 모듈 + Ollama 로컬 AI 서버를 하나의 명령으로 실행합니다.       ║
# ║  서비스 간 Docker 내부 네트워크로 통신하며,                         ║
# ║  호스트에서는 각 서비스의 포트로 접근 가능합니다.                     ║
# ║                                                                  ║
# ║  [실행 방법]                                                     ║
# ║  docker-compose up -d --build                                    ║
# ║                                                                  ║
# ║  [서비스 포트 매핑]                                               ║
# ║  agent-core:          localhost:8000 (Python FastAPI)             ║
# ║  agent-orchestrator:  localhost:8080 (Spring Boot WebFlux)       ║
# ║  agent-ai-spring:     localhost:8081 (Spring AI + HuggingFace)   ║
# ║  ollama:              localhost:11434 (로컬 LLM 서버)             ║
# ║                                                                  ║
# ║  [네트워크 구조]                                                  ║
# ║  모든 서비스는 agent-network 내에서 서비스명으로 통신합니다.         ║
# ║  예: agent-orchestrator → http://agent-core:8000/ask             ║
# ║      agent-ai-spring   → http://ollama:11434                    ║
# ║                                                                  ║
# ║  @author Hooney — AI FullStack Developer                         ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  # ──────────────────────────────────────────────────────────────
  # 🧠 Ollama — 로컬 AI 모델 서버
  # LLM(llama3.1)과 Embedding(nomic-embed-text) 모델을 서빙한다.
  # API Key 없이 무료로 AI 기능을 사용할 수 있는 핵심 인프라.
  # ──────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      # 호스트에서 직접 Ollama API를 호출할 때 사용
      - "11434:11434"
    volumes:
      # 모델 데이터 영속화 — 컨테이너 재시작 시 모델 재다운로드 방지
      - ollama_data:/root/.ollama
    # GPU 사용 시 아래 주석 해제 (NVIDIA GPU + nvidia-container-toolkit 필요)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 5
    networks:
      - agent-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # 📥 Ollama 모델 초기화 (init 컨테이너)
  # Ollama 서버 시작 후 필요한 모델을 자동 다운로드한다.
  # 일회성 실행 후 종료되는 Init Container 패턴.
  # ──────────────────────────────────────────────────────────────
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama
    entrypoint: >
      sh -c "
        echo '📥 Pulling LLM model (llama3.1)...' &&
        ollama pull llama3.1 &&
        echo '📥 Pulling Embedding model (nomic-embed-text)...' &&
        ollama pull nomic-embed-text &&
        echo '✅ All models ready!'
      "
    networks:
      - agent-network
    # 모델 다운로드 완료 후 자동 종료
    restart: "no"

  # ──────────────────────────────────────────────────────────────
  # 🐍 Agent Core — Python FastAPI (ReAct Agent + RAG)
  # LangChain 기반 자율 추론 에이전트와 ChromaDB RAG 엔진.
  # ──────────────────────────────────────────────────────────────
  agent-core:
    build:
      context: ./agent-core
      dockerfile: Dockerfile
    container_name: agent-core
    ports:
      - "8000:8000"
    environment:
      # ──────────────────────────────────────────────────────────
      # LLM 설정 — Ollama 로컬 서버를 OpenAI 호환 API로 사용
      # Docker 네트워크 내에서는 서비스명(ollama)으로 접근한다.
      # ──────────────────────────────────────────────────────────
      - OPENROUTER_BASE_URL=http://ollama:11434/v1
      - OPENROUTER_MODEL=llama3.1
      # Ollama는 API Key가 불필요하지만, ChatOpenAI가 필수로 요구하므로 더미 값 설정
      - OPENROUTER_API_KEY=ollama-local
      # RAG 지식 베이스 소스 경로 (컨테이너 내부 경로)
      - INFRA_DOCS_PATH=/app/data/knowledge
    volumes:
      # RAG 벡터 저장소 영속화
      - agent_core_chromadb:/app/data/chromadb
      # 호스트의 기술 문서를 컨테이너에 마운트 (RAG 지식 소스)
      # 실제 infra-master-lab 등의 문서가 있는 경로로 변경하세요.
      # - d:/works/20260508/infra-master-lab:/app/data/knowledge:ro
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agent-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # ☕ Agent Orchestrator — Java Spring Boot (WebFlux)
  # agent-core와 HTTP 통신하는 오케스트레이션 계층.
  # ──────────────────────────────────────────────────────────────
  agent-orchestrator:
    build:
      # ⚠️ 빌드 컨텍스트를 프로젝트 루트로 설정
      # 이유: Gradle Wrapper(gradlew)가 루트에만 존재
      context: .
      dockerfile: agent-orchestrator/Dockerfile
    container_name: agent-orchestrator
    ports:
      - "8080:8080"
    environment:
      # Docker 네트워크 내에서 agent-core의 호스트명
      - AGENT_CORE_URL=http://agent-core:8000
      # Spring 프로파일 — application-docker.yml 활성화
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      agent-core:
        condition: service_healthy
    networks:
      - agent-network
    restart: unless-stopped

  # ──────────────────────────────────────────────────────────────
  # 🤖 Agent AI Spring — Java-native AI (Spring AI + Ollama)
  # Python 없이 Java에서 직접 LLM Chat, Embedding, RAG를 처리.
  # ──────────────────────────────────────────────────────────────
  agent-ai-spring:
    build:
      # ⚠️ 빌드 컨텍스트를 프로젝트 루트로 설정
      context: .
      dockerfile: agent-ai-spring/Dockerfile
    container_name: agent-ai-spring
    ports:
      - "8081:8081"
    environment:
      # Ollama 서버 주소 — Docker 네트워크 내부 호스트명 사용
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=llama3.1
      - OLLAMA_EMBEDDING_MODEL=nomic-embed-text
      # HuggingFace API Key (보유 시 설정, 없으면 Ollama 사용)
      # - HUGGINGFACE_API_KEY=[HUGGINGFACE_API_KEY]
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agent-network
    restart: unless-stopped

# ──────────────────────────────────────────────────────────────────
# 네트워크 정의
# bridge 드라이버: 단일 호스트 내에서 서비스 간 격리된 통신 제공
# ──────────────────────────────────────────────────────────────────
networks:
  agent-network:
    driver: bridge
    name: agent-brain-network

# ──────────────────────────────────────────────────────────────────
# 볼륨 정의
# 컨테이너 재시작/삭제 시에도 데이터를 보존하는 영속 저장소
# ──────────────────────────────────────────────────────────────────
volumes:
  # Ollama 모델 데이터 (llama3.1, nomic-embed-text 등)
  # 약 5~10GB — 모델 재다운로드 방지
  ollama_data:
    name: ollama_model_data

  # agent-core의 ChromaDB 벡터 저장소
  # RAG 인덱싱 결과 영속화
  agent_core_chromadb:
    name: agent_core_chromadb
